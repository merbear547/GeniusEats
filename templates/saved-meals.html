<!DOCTYPE html>
<html>
<head>
    <title>Saved Meals</title>
</head>
<body>
    <h1>Saved Meals</h1>
    
    <div id="meal-list" style="display:none; border: 1px solid #ccc; padding: 15px; border-radius: 8px;"> 
        <div class="meal-item">
            <span id="display-plan-name" style="font-weight: bold; color: green;"></span>
            <br><br>
            <button id="delete-btn" style="background-color: #bc4749; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer;">Delete</button>
        </div>
    </div>

    <div id="empty-message" style="display:none;">
        <p>No saved meal plans yet.</p>
        <a href="generator.html">Go back to Generator</a>
    </div>

    <div id="confirm-modal" style="display:none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 2px solid black; padding: 20px; z-index: 100;">
        <p>Are you sure you want to delete this plan?</p>
        <button id="confirm-delete">Confirm</button>
        <button onclick="document.getElementById('confirm-modal').style.display='none'">Cancel</button>
    </div>

    <script>
        const mealList = document.getElementById('meal-list');
        const emptyMessage = document.getElementById('empty-message');
        const planNameSpan = document.getElementById('display-plan-name');

        // 1. Check what was saved in the generator
        const highProtein = sessionStorage.getItem('saved-high-protein');
        const vegetarian = sessionStorage.getItem('saved-vegetarian');

        if (highProtein || vegetarian) {
            mealList.style.display = 'block';
            emptyMessage.style.display = 'none';
            // Show the correct name based on what's in storage
            planNameSpan.innerText = highProtein ? "High Protein Plan" : "Vegetarian Plan";
        } else {
            mealList.style.display = 'none';
            emptyMessage.style.display = 'block';
        }

        // 2. Delete Logic
        document.getElementById('delete-btn').onclick = () => {
            document.getElementById('confirm-modal').style.display = 'block';
        };

        document.getElementById('confirm-delete').onclick = () => {
            // Clear all possible saved keys
            sessionStorage.removeItem('saved-high-protein');
            sessionStorage.removeItem('saved-vegetarian');
            
            // Reload page to show empty state
            window.location.reload();
        };
    </script>
</body>
</html>
